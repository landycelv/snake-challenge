name: Build and Deploy to GitHub Pages

on:
  # Gitee Webhook 触发
  repository_dispatch:
    types: [gitee-push]
  # 也支持 GitHub 原生推送
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 设置 GITHUB_TOKEN 权限
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # 禁用缓存，确保每次都是全新安装
          cache: ''

      - name: Clean install
        run: |
          # 清除可能的缓存
          rm -rf node_modules package-lock.json
          
      - name: Install dependencies
        run: |
          # 重新生成 lock 文件并安装
          npm install --legacy-peer-deps
          # 验证类型定义已安装
          ls -la node_modules/@types/

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          ls -la dist/
          echo "Build completed successfully!"

      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'chore: deploy to github pages [auto]'

      # 仅同步代码到 Gitee（不再部署到 Gitee Pages）
      - name: Sync to Gitee
        if: github.event_name != 'repository_dispatch'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repository_url: 'https://${{ secrets.GITEE_TOKEN }}@gitee.com/landycelv/snake-challenge.git'
          branch: main
          force: false
