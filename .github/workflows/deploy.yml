name: Build and Deploy to Gitee Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 设置 GITHUB_TOKEN 权限
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          ls -la dist/
          echo "Build completed successfully!"

      # 方案 1: 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'chore: deploy to github pages'

      # 方案 2: 同步到 Gitee (需要配置 GITEE_TOKEN)
      - name: Sync to Gitee
        if: ${{ secrets.GITEE_TOKEN != '' }}
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          force: false
          
      - name: Deploy to Gitee Pages via SSH
        if: ${{ secrets.GITEE_SSH_KEY != '' }}
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_KEY }}
          REMOTE_HOST: 'gitee.com'
          REMOTE_USER: 'your-gitee-username'
          SOURCE_DIR: 'dist'
          TARGET_DIR: 'your-repo-name'
