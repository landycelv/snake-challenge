name: Build and Deploy to Gitee Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 设置 GITHUB_TOKEN 权限
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          ls -la dist/
          echo "Build completed successfully!"

      # 方案 1: 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'chore: deploy to github pages'

      # 方案 2: 同步代码到 Gitee
      - name: Sync to Gitee
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repository_url: 'https://${{ secrets.GITEE_TOKEN }}@gitee.com/landycelv/snake-challenge.git'
          branch: main
          force: false
          
      # 方案 3: Deploy to Gitee Pages (使用 Token)
      - name: Deploy to Gitee Pages
        run: |
          # 配置 Git 用户信息
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 克隆 Gitee 仓库的 gh-pages 分支
          git clone -b gh-pages https://${{ secrets.GITEE_TOKEN }}@gitee.com/landycelv/snake-challenge.git gitee-pages 2>/dev/null || {
            echo "gh-pages 分支不存在，创建新分支"
            git clone https://${{ secrets.GITEE_TOKEN }}@gitee.com/landycelv/snake-challenge.git gitee-pages
            cd gitee-pages
            git checkout --orphan gh-pages
            git reset --hard
            cd ..
          }
          
          # 复制构建产物
          rm -rf gitee-pages/*
          cp -r dist/* gitee-pages/
          
          # 提交并推送
          cd gitee-pages
          git add .
          git commit -m "chore: deploy to gitee pages [auto ci]" || echo "No changes to commit"
          git push origin gh-pages
